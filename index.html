<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doktor Paneli - Hastalar</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar__left">
          <div class="logo" aria-hidden="true">
            <span class="logo__mark"></span>
          </div>
          <div class="topbar__titles">
            <div class="topbar__title">Doktor Paneli</div>
            <div class="topbar__subtitle">Hastalar ve MR Görüntüleyici</div>
          </div>
        </div>

        <div class="topbar__right">
          <div class="pill" id="dataSourcePill" title="Veri kaynağı">
            <span class="pill__dot" aria-hidden="true"></span>
            <span id="dataSourceLabel">Yükleniyor…</span>
          </div>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <nav class="nav">
            <button class="nav__item nav__item--active" type="button" aria-current="page">
              Hastalar
            </button>
            <button class="nav__item" type="button" disabled>
              Randevular (yakında)
            </button>
            <button class="nav__item" type="button" disabled>
              Raporlar (yakında)
            </button>
          </nav>

          <div class="sidebar__footer">
            <div class="doctor">
              <div class="doctor__avatar" aria-hidden="true">Dr</div>
              <div class="doctor__meta">
                <div class="doctor__name">Dr. Ayşe Yılmaz</div>
                <div class="doctor__role">Radyoloji</div>
              </div>
            </div>
          </div>
        </aside>

        <main class="content">
          <section class="card controls">
            <div class="controls__row">
              <div class="field">
                <label class="field__label" for="search">Hasta ara</label>
                <input id="search" class="field__input" type="text" placeholder="İsim veya yaş..." />
              </div>

              <div class="field">
                <label class="field__label" for="sort">Sırala</label>
                <select id="sort" class="field__input">
                  <option value="name">İsme göre</option>
                  <option value="age">Yaşa göre</option>
                  <option value="recent">Yakın tarihe göre</option>
                </select>
              </div>

              <div class="field">
                <label class="field__label" for="filterAge">Yaş aralığı</label>
                <select id="filterAge" class="field__input">
                  <option value="all">Tümü</option>
                  <option value="child">0-17</option>
                  <option value="adult">18-64</option>
                  <option value="senior">65+</option>
                </select>
              </div>
            </div>
          </section>

          <section class="card add-patient" id="addPatientCard" aria-labelledby="addPatientHeading">
            <div class="add-patient__head">
              <div>
                <div class="section-title" id="addPatientHeading">Yeni hasta</div>
                <div class="section-subtitle">Yeni kayıt oluştur</div>
              </div>
            </div>
            <form id="addPatientForm" class="add-patient__form" novalidate>
              <fieldset class="add-patient__fieldset" id="addPatientFieldset">
                <div class="add-patient__grid">
                  <div class="field">
                    <label class="field__label" for="newName">Ad soyad</label>
                    <input id="newName" name="name" class="field__input" type="text" required autocomplete="name" />
                  </div>
                  <div class="field">
                    <label class="field__label" for="newAge">Yaş</label>
                    <input id="newAge" name="age" class="field__input" type="number" min="0" max="150" required inputmode="numeric" />
                  </div>
                  <div class="field">
                    <label class="field__label" for="newGender">Cinsiyet</label>
                    <select id="newGender" name="gender" class="field__input">
                      <option value="Kadın">Kadın</option>
                      <option value="Erkek">Erkek</option>
                      <option value="">Belirtilmedi</option>
                    </select>
                  </div>
                  <div class="field">
                    <label class="field__label" for="newMrType">MR tipi</label>
                    <input id="newMrType" name="mrType" class="field__input" type="text" />
                  </div>
                  <div class="field">
                    <label class="field__label" for="newFinding">Bulgu / not</label>
                    <input id="newFinding" name="finding" class="field__input" type="text" />
                  </div>
                  <div class="field">
                    <label class="field__label" for="newRecentDays">Son inceleme (gün önce)</label>
                    <input id="newRecentDays" name="recentDaysAgo" class="field__input" type="number" min="0" value="0" inputmode="numeric" />
                  </div>
                  <div class="field add-patient__span2">
                    <label class="field__label" for="newMrImage">MR görsel URL (isteğe bağlı)</label>
                    <input id="newMrImage" name="mrImage" class="field__input" type="text" />
                  </div>
                  <div class="field">
                    <label class="field__label" for="newAccent">Vurgu rengi</label>
                    <input id="newAccent" name="accent" class="field__input" type="color" value="#0078d4" />
                  </div>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn--primary" id="addPatientSubmit">Veritabanına kaydet</button>
                  <span class="form-msg" id="addPatientMsg" role="status"></span>
                </div>
              </fieldset>
            </form>
          </section>

          <section class="grid" aria-live="polite">
            <div class="grid__header">
              <div>
                <div class="section-title">Hastalar</div>
                <div class="section-subtitle">Liste</div>
              </div>
              <div class="grid__meta">
                <span class="badge" id="patientCountBadge">0 hasta</span>
              </div>
            </div>

            <div id="patientsGrid" class="patients"></div>
          </section>
        </main>
      </div>
    </div>

    <!-- MR Modal -->
    <div class="modal" id="mrModal" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="modal__backdrop" data-close="true"></div>
      <div class="modal__panel" role="document">
        <div class="modal__header">
          <div>
            <div class="modal__title" id="mrModalTitle">MR Görüntüsü</div>
            <div class="modal__subtitle" id="mrModalSubtitle"> </div>
          </div>
          <button class="icon-btn" type="button" data-close="true" aria-label="Kapat">
            <span aria-hidden="true">✕</span>
          </button>
        </div>

        <div class="modal__body">
          <div class="mr-viewer">
            <img id="mrImage" class="mr-viewer__img" alt="MR görüntüsü" />
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
